<div class="page-container">
  <!-- Toolbar -->
  <div class="page-toolbar">
    <nav class="breadcrumb-nav">
      <a (click)="router.navigate(['/admin/departments'])" class="breadcrumb-link" style="cursor: pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5m7-7l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Back to Departments
      </a>
    </nav>
  </div>

  <!-- Header -->
  <div class="page-header">
    <div class="heading-style">
      <h4 class="heading-label">Administration</h4>
      <h2 class="heading-title">{{ isEdit() ? 'Edit Department' : 'Create New Department' }}</h2>
    </div>
  </div>

  <!-- Loading State -->
  @if (loading()) {
  <div class="loading-state">
    <div class="spinner"></div>
    <p>Loading department data...</p>
  </div>
  }

  <!-- Form -->
  @if (!loading()) {
  <div class="form-card">
    <form (ngSubmit)="save()" #departmentForm="ngForm">

      <!-- Department Name -->
      <div class="form-group">
        <label for="name">Department Name <span class="required-star">*</span></label>
        <input type="text" id="name" name="name" class="form-control" [(ngModel)]="department().name" required
          placeholder="Enter department name (e.g., IT, HR, Finance)" #name="ngModel"
          [class.is-invalid]="name.invalid && (name.dirty || name.touched)" />
        @if (name.invalid && (name.dirty || name.touched)) {
        <small class="field-error">Department name is required</small>
        }
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" class="form-control" [(ngModel)]="department().description"
          rows="5" placeholder="Describe the responsibilities of this department..."></textarea>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button type="button" class="pill-button-sm pill-outline-sm" (click)="router.navigate(['/admin/departments'])">
          Cancel
        </button>
        <button type="submit" class="pill-button-sm pill-primary-sm" [disabled]="!departmentForm.form.valid">
          {{ isEdit() ? 'Update Department' : 'Create Department' }}
        </button>
      </div>
    </form>
  </div>
  }
</div>
