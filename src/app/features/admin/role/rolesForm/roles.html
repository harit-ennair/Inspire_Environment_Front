<div class="page-container">
  <!-- Toolbar -->
  <div class="page-toolbar">
    <nav class="breadcrumb-nav">
      <a (click)="router.navigate(['/admin/roles'])" class="breadcrumb-link" style="cursor: pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5m7-7l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Back to Roles
      </a>
    </nav>
  </div>

  <!-- Header -->
  <div class="page-header">
    <div class="heading-style">
      <h4 class="heading-label">Administration</h4>
      <h2 class="heading-title">{{ isEdit() ? 'Edit Role' : 'Create New Role' }}</h2>
    </div>
  </div>

  <!-- Loading State -->
  @if (loading()) {
  <div class="loading-state">
    <div class="spinner"></div>
    <p>Loading role data...</p>
  </div>
  }

  <!-- Form -->
  @if (!loading()) {
  <div class="form-card">
    <form (ngSubmit)="save()" #roleForm="ngForm">

      <!-- Role Name -->
      <div class="form-group">
        <label for="name">Role Name <span class="required-star">*</span></label>
        <input type="text" id="name" name="name" class="form-control" [(ngModel)]="role().name" required
          placeholder="Enter role name (e.g., Admin, Manager)" #name="ngModel"
          [class.is-invalid]="name.invalid && (name.dirty || name.touched)" />
        @if (name.invalid && (name.dirty || name.touched)) {
        <small class="field-error">Role name is required</small>
        }
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" class="form-control" [(ngModel)]="role().description" rows="5"
          placeholder="Describe the responsibilities of this role..."></textarea>
      </div>

      <!-- Form Actions -->
      <div class="form-actions">
        <button type="button" class="pill-button-sm pill-outline-sm" (click)="router.navigate(['/admin/roles'])">
          Cancel
        </button>
        <button type="submit" class="pill-button-sm pill-primary-sm" [disabled]="!roleForm.form.valid">
          {{ isEdit() ? 'Update Role' : 'Create Role' }}
        </button>
      </div>
    </form>
  </div>
  }
</div>
