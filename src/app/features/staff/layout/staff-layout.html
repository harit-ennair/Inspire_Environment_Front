<div class="shell">
    <header class="navbar">
        <div class="navbar-inner">
            <a routerLink="/staff/dashboard" class="navbar-logo" (click)="closeMenu()">
                <img src="/cltured-removebg-preview.png" alt="Inspire Environment" class="logo-img">
                <span class="role-badge">Staff</span>
            </a>
            <nav class="nav-links">
                @for (link of navLinks; track link.path) {
                <a [routerLink]="link.path" routerLinkActive="active" class="nav-link">{{ link.label }}</a>
                }
            </nav>
            <div class="navbar-right">
                <span class="user-name">{{ userName }}</span>
                <button class="logout-btn" (click)="logout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
                <button class="hamburger" (click)="toggleMenu()" [class.open]="mobileMenuOpen">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        @if (mobileMenuOpen) {
        <div class="mobile-menu">
            @for (link of navLinks; track link.path) {
            <a [routerLink]="link.path" routerLinkActive="active" class="mobile-link" (click)="closeMenu()">{{
                link.label }}</a>
            }
            <button class="mobile-logout" (click)="logout()">Logout</button>
        </div>
        }
    </header>
    <main class="page-content"><router-outlet></router-outlet></main>
</div>
